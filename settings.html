<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Orikyx DevSec Hub</title>
    <style>
        /* Basic styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
        }

        body.default-theme {
            color: #fff;
            animation: rgbBackground 10s infinite;
        }

        body.dark-theme {
            color: #fff;
            animation: rgbBackgroundDark 10s infinite;
        }

        body.light-theme {
            color: #000;
            animation: rgbBackgroundLight 10s infinite;
        }

        @keyframes rgbBackground {
            0% { background-color: rgb(255, 0, 0); }
            25% { background-color: rgb(0, 255, 0); }
            50% { background-color: rgb(0, 0, 255); }
            75% { background-color: rgb(255, 255, 0); }
            100% { background-color: rgb(255, 0, 255); }
        }

        @keyframes rgbBackgroundDark {
            0% { background-color: rgb(50, 0, 0); }
            25% { background-color: rgb(0, 50, 0); }
            50% { background-color: rgb(0, 0, 50); }
            75% { background-color: rgb(50, 50, 0); }
            100% { background-color: rgb(50, 0, 50); }
        }

        @keyframes rgbBackgroundLight {
            0% { background-color: rgb(255, 128, 128); }
            25% { background-color: rgb(128, 255, 128); }
            50% { background-color: rgb(128, 128, 255); }
            75% { background-color: rgb(255, 255, 128); }
            100% { background-color: rgb(255, 128, 255); }
        }

        /* Navigation Styling */
        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 1.2em;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Section Styling */
        section {
            margin: 20px;
            text-align: center;
        }

        .setting-button {
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px;
        }

        .setting-button:hover {
            background-color: #555;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #333;
            color: white;
            display: none;
        }

        footer.visible {
            display: block;
        }

    </style>
</head>
<body>

    <!-- Navigation Menu -->
    <nav>
        <a href="index.html">Home</a>
        <a href="ps3programming.html">PS3 Programming</a>
        <a href="cybersecurity.html">Cybersecurity</a>
        <a href="learningcode.html">Learning Code</a>
    </nav>

    <div>
        <h1>Settings - Orikyx DevSec Hub</h1>

        <!-- Theme Selection -->
        <section id="theme-settings">
            <h2>Choose Theme</h2>
            <button class="setting-button" id="default-theme">Default Theme</button>
            <button class="setting-button" id="dark-theme">Dark Theme</button>
            <button class="setting-button" id="light-theme">Light Theme</button>
        </section>

        <!-- Music Toggle -->
        <section id="music-settings">
            <h2>Background Music</h2>
            <button class="setting-button" id="music-toggle">Toggle Music</button>
        </section>
        <!-- Audio for Music -->
        <audio id="background-music" loop>
            <source src="Juice WRLD - Cuffed (Official Audio).mp3" type="audio/mp3">
            Your browser does not support the audio element.
        </audio>


        <!-- Sound Effects Toggle -->
        <section id="sound-settings">
            <h2>Sound Effects</h2>
            <button class="setting-button" id="sound-toggle">Toggle Sound Effects</button>
        </section>

        <!-- Footer Toggle -->
        <section id="footer-settings">
            <h2>Footer Visibility</h2>
            <button class="setting-button" id="show-footer">Show Footer</button>
            <button class="setting-button" id="hide-footer">Hide Footer</button>
        </section>
    </div>

    <!-- Footer -->
    <footer id="footer">
        <p>© 2025 Orikyx DevSec Hub</p>
    </footer>

    <!-- Sound Effect -->
    <audio id="sound-effect">
        <source src="your-sound-effect.mp3" type="audio/mp3">
        Your browser does not support the audio element.
    </audio>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            // Apply stored theme preference
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme) {
                document.body.classList.add(savedTheme);
            }

            // Theme change handlers
            document.getElementById("default-theme").addEventListener("click", function () {
                document.body.classList.remove("dark-theme", "light-theme");
                document.body.classList.add("default-theme");
                localStorage.setItem("theme", "default-theme");
            });

            document.getElementById("dark-theme").addEventListener("click", function () {
                document.body.classList.remove("default-theme", "light-theme");
                document.body.classList.add("dark-theme");
                localStorage.setItem("theme", "dark-theme");
            });

            document.getElementById("light-theme").addEventListener("click", function () {
                document.body.classList.remove("default-theme", "dark-theme");
                document.body.classList.add("light-theme");
                localStorage.setItem("theme", "light-theme");
            });

            // Music toggle
            const musicElement = document.getElementById("background-music");
            document.getElementById("music-toggle").addEventListener("click", function () {
                if (musicElement.paused) {
                    musicElement.play();
                } else {
                    musicElement.pause();
                }
            });

            // Sound Effects toggle
            const soundElement = document.getElementById("sound-effect");
            document.getElementById("sound-toggle").addEventListener("click", function () {
                if (soundElement.paused) {
                    soundElement.play();
                } else {
                    soundElement.pause();
                }
            });

            // Footer visibility
            const footerElement = document.getElementById("footer");
            const showFooterButton = document.getElementById("show-footer");
            const hideFooterButton = document.getElementById("hide-footer");

            if (localStorage.getItem("footer") === "hide") {
                footerElement.classList.remove("visible");
            }

            showFooterButton.addEventListener("click", function () {
                footerElement.classList.add("visible");
                localStorage.setItem("footer", "show");
            });

            hideFooterButton.addEventListener("click", function () {
                footerElement.classList.remove("visible");
                localStorage.setItem("footer", "hide");
            });
        });
    </script>
</body>
</html>
