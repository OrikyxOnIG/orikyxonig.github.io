<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Orikyx DevSec Hub</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            animation: rgbBackground 10s infinite alternate;
            background-color: #f4f4f4;
            color: #333;
        }

        /* RGB Background Animation */
        @keyframes rgbBackground {
            0% {
                background-color: rgb(255, 0, 0); /* Red */
            }
            25% {
                background-color: rgb(0, 255, 0); /* Green */
            }
            50% {
                background-color: rgb(0, 0, 255); /* Blue */
            }
            75% {
                background-color: rgb(255, 255, 0); /* Yellow */
            }
            100% {
                background-color: rgb(255, 165, 0); /* Orange */
            }
        }

        /* Navigation Styles */
        nav {
            background-color: #333;
            color: white;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: space-around;
        }

        nav ul li {
            padding: 10px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        nav ul li a:hover {
            text-decoration: underline;
        }

        /* Main Content */
        .content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Buttons and Settings Section */
        .setting-button {
            padding: 12px;
            margin: 10px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .setting-button:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            nav ul {
                flex-direction: column;
                align-items: center;
            }

            .content {
                padding: 10px;
            }

            .setting-button {
                width: 100%;
            }
        }

        /* Transitions and Animations */
        .setting-button {
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="downloads.html">Downloads</a></li>
            <li><a href="ps3programming.html">PS3 Programming</a></li>
            <li><a href="learningcode.html">Learning Code</a></li>
            <li><a href="cybersecurity.html">Cybersecurity</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="content">
        <section id="general-settings">
            <h1>General Settings</h1>
            <div class="button-container">
                <button class="setting-button" id="theme-default">Default Theme</button>
                <button class="setting-button" id="theme-dark">Dark Theme</button>
                <button class="setting-button" id="theme-light">Light Theme</button>
            </div>
        </section>

        <section id="theme-settings">
            <h1>Theme Settings</h1>
            <div class="button-container">
                <button class="setting-button" id="color-blue">Blue Color</button>
                <button class="setting-button" id="color-red">Red Color</button>
                <button class="setting-button" id="color-green">Green Color</button>
                <button class="setting-button" id="color-black">Black Color</button>
            </div>
        </section>

        <section id="font-settings">
            <h1>Font Settings</h1>
            <div class="button-container">
                <button class="setting-button" id="font-small">Small Font</button>
                <button class="setting-button" id="font-medium">Medium Font</button>
                <button class="setting-button" id="font-large">Large Font</button>
            </div>
        </section>

        <section id="notifications-settings">
            <h1>Notifications Settings</h1>
            <div class="button-container">
                <button class="setting-button" id="show-notifications">Enable Notifications</button>
                <button class="setting-button" id="disable-notifications">Disable Notifications</button>
            </div>
        </section>

        <section id="footer-settings">
            <h1>Footer Settings</h1>
            <div class="button-container">
                <button class="setting-button" id="show-footer">Show Footer</button>
                <button class="setting-button" id="hide-footer">Hide Footer</button>
            </div>
        </section>

        <div class="settings-option">
            <label for="language-select">Language:</label>
            <select id="language-select">
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
  </select>
</div>
        <div class="settings-option">
            <label for="music-toggle">Background Music:</label>
            <button id="music-toggle">Turn On</button>
        </div>

    <div class="settings-option">
      <label for="sound-toggle">Sound Effects:</label>
      <button id="sound-toggle">Turn On</button>
    </div>

    </div>

    <!-- JavaScript for Settings Functionality -->
    <script>
        // Load settings from localStorage if they exist
        window.onload = function() {
            const savedTheme = localStorage.getItem('theme') || 'default';
            const savedFontSize = localStorage.getItem('font-size') || 'medium';
            applySettings(savedTheme, savedFontSize);
        };

        // Apply settings function
        function applySettings(theme, fontSize) {
            document.body.className = theme + ' ' + fontSize;
        }

        // Event listeners for buttons
        document.getElementById('theme-default').addEventListener('click', function() {
            localStorage.setItem('theme', 'default');
            applySettings('default', localStorage.getItem('font-size') || 'medium');
        });

        document.getElementById('theme-dark').addEventListener('click', function() {
            localStorage.setItem('theme', 'dark');
            applySettings('dark', localStorage.getItem('font-size') || 'medium');
        });

        document.getElementById('theme-light').addEventListener('click', function() {
            localStorage.setItem('theme', 'light');
            applySettings('light', localStorage.getItem('font-size') || 'medium');
        });

        document.getElementById('font-small').addEventListener('click', function() {
            localStorage.setItem('font-size', 'small');
            applySettings(localStorage.getItem('theme') || 'default', 'small');
        });

        document.getElementById('font-medium').addEventListener('click', function() {
            localStorage.setItem('font-size', 'medium');
            applySettings(localStorage.getItem('theme') || 'default', 'medium');
        });

        document.getElementById('font-large').addEventListener('click', function() {
            localStorage.setItem('font-size', 'large');
            applySettings(localStorage.getItem('theme') || 'default', 'large');
        });

        document.getElementById('show-notifications').addEventListener('click', function() {
            localStorage.setItem('notifications', 'enabled');
            alert("Notifications enabled!");
        });

        document.getElementById('disable-notifications').addEventListener('click', function() {
            localStorage.setItem('notifications', 'disabled');
            alert("Notifications disabled!");
        });

        document.getElementById('show-footer').addEventListener('click', function() {
            localStorage.setItem('footer', 'show');
            alert("Footer shown.");
        });

        document.getElementById('hide-footer').addEventListener('click', function() {
            localStorage.setItem('footer', 'hide');
            alert("Footer hidden.");
        });

// Function to apply the language change
function changeLanguage(language) {
    const content = {
        'en': {
            'welcome': 'Welcome to the Website',
            'tutorial': 'Start Learning Programming',
            'settings': 'Settings'
        },
        'es': {
            'welcome': 'Bienvenido al sitio web',
            'tutorial': 'Comienza a aprender programación',
            'settings': 'Configuración'
        },
        'fr': {
            'welcome': 'Bienvenue sur le site web',
            'tutorial': 'Commencez à apprendre la programmation',
            'settings': 'Paramètres'
        }
    };

    // Update text content on the page based on selected language
    document.querySelectorAll('.welcome-text').forEach(el => el.textContent = content[language]['welcome']);
    document.querySelectorAll('.tutorial-text').forEach(el => el.textContent = content[language]['tutorial']);
    document.querySelectorAll('.settings-text').forEach(el => el.textContent = content[language]['settings']);

    // Save language to localStorage
    localStorage.setItem('language', language);
}

// Function to initialize and control background music
function initializeMusic() {
    let music = document.getElementById("background-music");

    // Create audio element if it doesn’t exist
    if (!music) {
        music = document.createElement("audio");
        music.id = "background-music";
        music.src = "Juice WRLD - Cuffed (Official Audio).mp3"; // Update with the correct file path
        music.loop = true; // Ensures the song loops forever
        music.volume = 0.5; // Adjust volume if needed (0.0 to 1.0)
        document.body.appendChild(music);
    }

    // Check localStorage for music state
    const musicEnabled = localStorage.getItem("musicEnabled") === "true";

    if (musicEnabled) {
        music.play();
    } else {
        music.pause();
    }

    return music; // Return the audio object for later control
}

// Function to toggle music playback
function toggleMusic(music) {
    const musicEnabled = localStorage.getItem("musicEnabled") === "true";

    if (musicEnabled) {
        music.pause();
        localStorage.setItem("musicEnabled", "false");
    } else {
        music.play();
        localStorage.setItem("musicEnabled", "true");
    }
}

// Initialize the music on page load
window.onload = function () {
    const music = initializeMusic(); // Initialize the music when the page loads

    // Event listener for toggling the music
    document.getElementById("music-toggle").addEventListener("click", function () {
        toggleMusic(music);
        const currentState = localStorage.getItem("musicEnabled") === "true" ? "Turn Off" : "Turn On";
        document.getElementById("music-toggle").textContent = currentState;
    });

    // Ensure the toggle button text is correct based on the music state
    const currentState = localStorage.getItem("musicEnabled") === "true" ? "Turn Off" : "Turn On";
    document.getElementById("music-toggle").textContent = currentState;
};

// Function to enable/disable sound effects
function toggleSoundEffects() {
    const soundEnabled = localStorage.getItem('soundEnabled') === 'true';

    if (soundEnabled) {
        disableSoundEffects();
        localStorage.setItem('soundEnabled', 'false');
        document.getElementById('sound-toggle').textContent = 'Turn On';
    } else {
        enableSoundEffects();
        localStorage.setItem('soundEnabled', 'true');
        document.getElementById('sound-toggle').textContent = 'Turn Off';
    }
}

// Enable sound effects
function enableSoundEffects() {
    document.querySelectorAll('button').forEach(button => {
        button.addEventListener('click', function () {
            const clickSound = new Audio('path/to/click-sound.mp3');
            clickSound.play();
        });
    });
}

// Disable sound effects
function disableSoundEffects() {
    document.querySelectorAll('button').forEach(button => {
        button.removeEventListener('click', function () {});
    });
}

// On page load, check for stored settings and apply them
window.onload = function() {
    const savedLanguage = localStorage.getItem('language') || 'en';
    changeLanguage(savedLanguage);
    document.getElementById('language-select').value = savedLanguage;

    const musicEnabled = localStorage.getItem('musicEnabled') === 'true';
    const soundEnabled = localStorage.getItem('soundEnabled') === 'true';

    if (musicEnabled) {
        document.getElementById('music-toggle').textContent = 'Turn Off';
        // Implement background music logic here
    } else {
        document.getElementById('music-toggle').textContent = 'Turn On';
    }

    if (soundEnabled) {
        enableSoundEffects();
        document.getElementById('sound-toggle').textContent = 'Turn Off';
    } else {
        disableSoundEffects();
        document.getElementById('sound-toggle').textContent = 'Turn On';
    }
};

// Event listeners for changes
document.getElementById('language-select').addEventListener('change', function() {
    changeLanguage(this.value);
});

document.getElementById('music-toggle').addEventListener('click', toggleMusic);
document.getElementById('sound-toggle').addEventListener('click', toggleSoundEffects);

    </script>
</body>
</html>
