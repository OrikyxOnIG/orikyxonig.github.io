<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Orikyx DevSec Hub</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            animation: rgbBackground 10s infinite alternate;
            background-color: #f4f4f4;
            color: #333;
        }

        
        /* Default RGB Animation */
        @keyframes rgbBackground {
            0% { background-color: rgb(255, 0, 0); } /* Red */
            25% { background-color: rgb(0, 255, 0); } /* Green */
            50% { background-color: rgb(0, 0, 255); } /* Blue */
            75% { background-color: rgb(255, 255, 0); } /* Yellow */
            100% { background-color: rgb(255, 165, 0); } /* Orange */
        }

/* Dark Theme RGB Animation */
        @keyframes darkRgbBackground {
            0% { background-color: rgb(20, 0, 0); } /* Dark Red */
            25% { background-color: rgb(0, 20, 0); } /* Dark Green */
            50% { background-color: rgb(0, 0, 30); } /* Dark Blue */
            75% { background-color: rgb(30, 0, 30); } /* Dark Purple */
            100% { background-color: rgb(30, 30, 0); } /* Dark Yellow */
        }

/* Light Theme RGB Animation */
         @keyframes lightRgbBackground {
             0% { background-color: rgb(255, 255, 255); } /* White */
            25% { background-color: rgb(173, 216, 230); } /* Baby Blue */
            50% { background-color: rgb(255, 255, 0); } /* Yellow */
            75% { background-color: rgb(57, 255, 20); } /* Neon Green */
            100% { background-color: rgb(255, 165, 0); } /* Orange */
        }

        /* Apply animations based on body class */
        body.default-theme {
            animation: rgbBackground 10s infinite alternate;
        }
        
        body.dark-theme {
            animation: darkRgbBackground 10s infinite alternate;
            color: white;
        }
        
        body.light-theme {
            animation: lightRgbBackground 10s infinite alternate;
            color: black;
        }


        /* Navigation Styles */
        nav {
            background-color: #333;
            color: white;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: space-around;
        }

        nav ul li {
            padding: 10px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        nav ul li a:hover {
            text-decoration: underline;
        }

        /* Main Content */
        .content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Buttons and Settings Section */
        .setting-button {
            padding: 12px;
            margin: 10px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .setting-button:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            nav ul {
                flex-direction: column;
                align-items: center;
            }

            .content {
                padding: 10px;
            }

            .setting-button {
                width: 100%;
            }
        }

        /* Transitions and Animations */
        .setting-button {
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="downloads.html">Downloads</a></li>
            <li><a href="ps3programming.html">PS3 Programming</a></li>
            <li><a href="learningcode.html">Learning Code</a></li>
            <li><a href="cybersecurity.html">Cybersecurity</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="content">
        <section id="general-settings">
            <h1>General Settings</h1>
            <div class="button-container">
                <button class="setting-button theme-btn" data-theme="default">Default Theme</button>
                <button class="setting-button theme-btn" data-theme="dark">Dark Theme</button>
                <button class="setting-button theme-btn" data-theme="light">Light Theme</button>

            </div>
        </section>

        <section id="theme-settings">
            <h1>Theme Settings</h1>
            <div class="button-container">
                <button class="setting-button" id="color-blue">Blue Color</button>
                <button class="setting-button" id="color-red">Red Color</button>
                <button class="setting-button" id="color-green">Green Color</button>
                <button class="setting-button" id="color-black">Black Color</button>
            </div>
        </section>

        <section id="font-settings">
            <h1>Font Settings</h1>
            <div class="button-container">
                <button class="setting-button" id="font-small">Small Font</button>
                <button class="setting-button" id="font-medium">Medium Font</button>
                <button class="setting-button" id="font-large">Large Font</button>
            </div>
        </section>

        <section id="notifications-settings">
            <h1>Notifications Settings</h1>
            <div class="button-container">
                <button class="setting-button" id="show-notifications">Enable Notifications</button>
                <button class="setting-button" id="disable-notifications">Disable Notifications</button>
            </div>
        </section>

        <section id="footer-settings">
            <h1>Footer Settings</h1>
            <div class="button-container">
                <button class="setting-button" id="show-footer">Show Footer</button>
                <button class="setting-button" id="hide-footer">Hide Footer</button>
            </div>
        </section>

        <section id="language-settings">
    <h1>Language Settings</h1>
    <div class="button-container">
        <button class="setting-button lang-btn" data-lang="en">English</button>
        <button class="setting-button lang-btn" data-lang="es">Español</button>
        <button class="setting-button lang-btn" data-lang="fr">Français</button>
    </div>
</section>

<section id="music-settings">
    <h1>Background Music</h1>
    <div class="button-container">
        <button class="setting-button" id="music-toggle">Turn On Music</button>
    </div>
</section>

<section id="sound-settings">
    <h1>Sound Effects</h1>
    <div class="button-container">
        <button class="setting-button" id="sound-toggle">Turn On Sound Effects</button>
    </div>
</section>



    </div>

    <!-- JavaScript for Settings Functionality -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
    // 🌍 APPLY SAVED SETTINGS ON PAGE LOAD
    function applySettings() {
        document.body.classList.add(localStorage.getItem("theme") || "default");
        document.body.classList.add(localStorage.getItem("font-size") || "medium");
        document.documentElement.lang = localStorage.getItem("selectedLanguage") || "en";

        // Footer visibility
        if (localStorage.getItem("footer") === "hide") {
            document.getElementById("footer").style.display = "none";
        } else {
            document.getElementById("footer").style.display = "block";
        }
    }
    applySettings();

    // 🌈 THEME SETTINGS
    document.querySelectorAll('.theme-btn').forEach(button => {
    button.addEventListener('click', () => {
        let theme = button.getAttribute('data-theme');
        document.body.className = theme;
    });
});
                document.getElementById('theme-default').addEventListener('click', function() {
        document.body.className = 'default-theme';
    });
    
    document.getElementById('theme-dark').addEventListener('click', function() {
        document.body.className = 'dark-theme';
    });
    
    document.getElementById('theme-light').addEventListener('click', function() {
        document.body.className = 'light-theme';
    });



    // 🔠 FONT SIZE SETTINGS
    document.querySelectorAll(".font-btn").forEach((btn) => {
        btn.addEventListener("click", function () {
            let fontSize = this.dataset.font;
            localStorage.setItem("font-size", fontSize);
            document.body.classList.add(fontSize);
        });
    });

    // 🔔 NOTIFICATION SETTINGS
    document.getElementById("show-notifications").addEventListener("click", function () {
        localStorage.setItem("notifications", "enabled");
        alert("Notifications enabled!");
    });

    document.getElementById("disable-notifications").addEventListener("click", function () {
        localStorage.setItem("notifications", "disabled");
        alert("Notifications disabled!");
    });

    // 🌍 LANGUAGE SELECTION
    document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.addEventListener("click", function () {
            let lang = this.dataset.lang;
            localStorage.setItem("selectedLanguage", lang);
            document.documentElement.lang = lang;
            location.reload(); // Apply changes across pages
        });
    });

    // 🎵 BACKGROUND MUSIC TOGGLE
    let music = document.getElementById("background-music") || document.createElement("audio");
    if (!document.getElementById("background-music")) {
        music.id = "background-music";
        music.src = "path/to/your/music.mp3"; // Replace with actual file
        music.loop = true;
        document.body.appendChild(music);
    }

    let musicToggleBtn = document.getElementById("music-toggle");
    if (localStorage.getItem("musicEnabled") === "true") {
        music.play();
        musicToggleBtn.textContent = "Turn Off Music";
    }

    musicToggleBtn.addEventListener("click", function () {
        if (music.paused) {
            music.play();
            localStorage.setItem("musicEnabled", "true");
            this.textContent = "Turn Off Music";
        } else {
            music.pause();
            localStorage.setItem("musicEnabled", "false");
            this.textContent = "Turn On Music";
        }
    });

    // 🔊 SOUND EFFECTS TOGGLE
    let soundToggleBtn = document.getElementById("sound-toggle");
    soundToggleBtn.addEventListener("click", function () {
        let soundEnabled = localStorage.getItem("soundEnabled") === "true";
        localStorage.setItem("soundEnabled", !soundEnabled);
        this.textContent = soundEnabled ? "Turn On Sound Effects" : "Turn Off Sound Effects";
    });

    // 📢 PLAY SOUND EFFECT FUNCTION
    function playSoundEffect() {
        if (localStorage.getItem("soundEnabled") === "true") {
            let sound = new Audio("Juice WrLD - Cuffed (Official Audio).mp3"); // Replace with actual file
            sound.play();
        }
    }

    // Add sound effect to all buttons
    document.querySelectorAll(".setting-button").forEach((btn) => {
        btn.addEventListener("click", playSoundEffect);
    });
});

    </script>
</body>
</html>
