<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS3 Programming</title>
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        /* General Styles */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            animation: rgbBackground 5s infinite alternate;
            transition: background 0.5s ease;
            padding-top: 60px; /* Space for fixed navigation bar */
        }

        /* RGB Background Animation */
        @keyframes rgbBackground {
            0% { background: rgb(255, 0, 0); }
            33% { background: rgb(0, 255, 0); }
            66% { background: rgb(0, 0, 255); }
            100% { background: rgb(255, 0, 0); }
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1;
            flex-wrap: wrap;
            justify-content: space-around;
            transition: 0.3s;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            margin: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            transition: 0.3s;
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* H1 Styling */
        h1 {
            font-size: 36px;
            font-weight: bold;
            color: white;
            margin-top: 100px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 5px;
        }

        /* Button Styling */
        .btn {
            display: block;
            width: 300px;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid white;
            border-radius: 5px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Mobile Navigation (Hamburger Menu) */
        .menu-icon {
            display: none;
            font-size: 30px;
            color: white;
            cursor: pointer;
            position: absolute;
            right: 20px;
            top: 15px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .nav-links a {
            padding: 15px;
        }

        /* Mobile Navigation Toggled */
        .mobile-nav {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            z-index: 1;
        }

        .mobile-nav a {
            padding: 20px;
            width: 100%;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            nav a {
                padding: 12px 20px;
            }

            .btn {
                width: 250px;
                font-size: 16px;
            }

            .menu-icon {
                display: block;
            }

            nav {
                display: none; /* Hide regular nav on small screens */
            }

            .mobile-nav a {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 18px;
            }

            nav a {
                padding: 10px 15px;
                font-size: 14px;
            }

            .btn {
                width: 200px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar (replacing header) -->
    <nav>
        <a href="index.html">Home</a>
        <a href="downloads.html">Downloads</a>
        <a href="learningcode.html">Learning Code</a>
    </nav>

    <!-- Hamburger Menu for Mobile -->
    <div class="menu-icon" onclick="toggleMobileNav()">&#9776;</div>

    <div class="mobile-nav" id="mobile-nav">
        <a href="index.html">Home</a>
        <a href="downloads.html">Downloads</a>
        <a href="learningcode.html">Learning Code</a>
    </div>

    <!-- H1 title for PS3 Programming -->
    <h1>PS3 Programming</h1>

    <div class="container">
        <a href="setup.html" class="btn">Setting Up PS3SDK or PSL1GHT</a>
        <a href="reverseengineer.html" class="btn">Learning How to Reverse Engineer</a>
        <a href="scripts.html" class="btn">Scripts</a>
        <a href="offsets.html" class="btn">Game Memory Addresses/Offsets</a>
        <a href="learningps3dev.html" class="btn">Understanding PS3 Development</a>
        <a href="ps3advice.html" class="btn">Tips and Tricks</a>
    </div>

    <script>
        function toggleMobileNav() {
            const mobileNav = document.getElementById("mobile-nav");
            mobileNav.style.display = (mobileNav.style.display === "flex") ? "none" : "flex";
        }
    </script>
</body>
</html>
