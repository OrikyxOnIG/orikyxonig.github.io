<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS3 Programming</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            animation: rgbBackground 5s infinite alternate;
        }

        /* RGB Background Animation */
        @keyframes rgbBackground {
            0% { background: rgb(255, 0, 0); }
            33% { background: rgb(0, 255, 0); }
            66% { background: rgb(0, 0, 255); }
            100% { background: rgb(255, 0, 0); }
        }

        /* Header */
        header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.8);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 2;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            position: fixed;
            top: 60px;
            width: 100%;
            z-index: 1;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            margin: 0 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            transition: 0.3s;
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Body Content */
        .container {
            margin-top: 120px; /* Adjust margin to avoid overlap */
        }

        .btn {
            display: block;
            width: 300px;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid white;
            border-radius: 5px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                font-size: 20px;
            }

            nav a {
                padding: 12px 20px;
            }

            .btn {
                width: 250px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            header {
                font-size: 18px;
            }

            nav a {
                padding: 10px 15px;
                font-size: 14px;
            }

            .btn {
                width: 200px;
                font-size: 14px;
            }
        }
    </style>
</head>

</body>
</html>
