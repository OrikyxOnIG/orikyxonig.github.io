<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Orikyx DevSec Hub</title>
    <meta name="description" content="Explore programming, cybersecurity, and PS3 programming at Orikyx DevSec Hub.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            color: #f4f4f4;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(270deg, #ff0000, #00ff00, #0000ff);
            background-size: 600% 600%;
            animation: rgbAnimation 10s infinite alternate ease-in-out;
        }

        @keyframes rgbAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Header styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #222;
            padding: 10px 20px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .header-buttons a {
            text-decoration: none;
            color: #000;
            background: linear-gradient(270deg, #ff0000, #00ff00, #0000ff);
            background-size: 600% 600%;
            animation: rgbAnimation 10s infinite alternate ease-in-out;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            transition: opacity 0.3s ease;
        }

        .header-buttons a:hover {
            opacity: 0.8;
        }

        /* Sidebar styles */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background-color: #222;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.5);
            transition: left 0.3s ease;
            z-index: 1001;
        }

        .sidebar .close-btn {
            font-size: 1.5rem;
            color: gold;
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            margin-bottom: 20px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: #f4f4f4;
            font-size: 16px;
            font-weight: bold;
            display: block;
            padding: 10px;
            background: linear-gradient(270deg, #ff0000, #00ff00, #0000ff);
            background-size: 600% 600%;
            animation: rgbAnimation 10s infinite alternate ease-in-out;
            border-radius: 5px;
            transition: opacity 0.3s ease;
        }

        .sidebar ul li a:hover {
            opacity: 0.8;
        }

        /* Sidebar open state */
        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar.active {
            left: 0;
        }

        /* Main content styles */
        .main-content {
            flex: 1;
            margin-top: 60px;
            padding: 20px;
            text-align: center;
        }

        .main-content h1 {
            color: black;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .main-content p {
            font-size: 1.2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Footer styles */
        footer {
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            position: sticky;
            bottom: 0;
            width: 100%;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .header-buttons a {
                font-size: 12px;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <button id="menu-btn" aria-label="Open menu">&#9776;</button>
        <div class="header-buttons">
            <a href="log-in.html">Login</a>
            <a href="signup.html">Sign Up</a>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="sidebar" id="sidebar">
        <button class="close-btn" id="close-btn" aria-label="Close menu">&times;</button>
        <ul>
            <li><a href="learningcode.html">Learning Code</a></li>
            <li><a href="cybersecurity.html">Cybersecurity</a></li>
            <li><a href="ps3programming.html">PS3 Programming</a></li>
            <li><a href="downloads.html">Downloads</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h1>Orikyx DevSec Hub</h1>
        <p>Explore programming, cybersecurity, and PS3 programming through tutorials, resources, and discussions.</p>
    </div>

    <footer>
      <p>Created by Bryson Harvey</p>
        <p>
            <a href="https://facebook.com/BrysonHarvey" target="_blank">Facebook</a> |
            <a href="https://instagram.com/freeorikyx" target="_blank">Instagram</a> |
            <a href="mailto:b21227127@gmail.com">Email</a>
        </p>
    </footer>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const sidebar = document.getElementById('sidebar');
        const closeBtn = document.getElementById('close-btn');

        menuBtn.addEventListener('click', () => {
            sidebarOverlay.classList.add('active');
            sidebar.classList.add('active');
        });

        closeBtn.addEventListener('click', () => {
            sidebarOverlay.classList.remove('active');
            sidebar.classList.remove('active');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebarOverlay.classList.remove('active');
            sidebar.classList.remove('active');
        });
    </script>
</body>
</html>
