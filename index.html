    <style>
        @keyframes rgbGlow {
            0% { color: red; }
            33% { color: blue; }
            66% { color: green; }
            100% { color: red; }
        }

        @keyframes backgroundRGB {
            0% { background: #ff0000; }
            33% { background: #0000ff; }
            66% { background: #00ff00; }
            100% { background: #ff0000; }
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

            padding: 20px;
            transition: all 0.3s;
        }

        #sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
            animation: rgbGlow 3s infinite;
        }

        #sidebar ul {
            list-style: none;
            padding: 0;
        }

        #sidebar ul li {
            padding: 10px;
            text-align: center;
        }

        #sidebar ul li a {
            color: white;
            text-decoration: none;
            display: block;
        }

        #sidebar ul li a:hover {
            background: #444;
        }

        #content {
            margin-left: 270px;
            padding: 20px;
        }

        /* Responsive Design */
        @media screen and (max-width: 768px) {
            #sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            #content {
                margin-left: 0;
                padding-top: 20px;
            }

            #sidebar ul {
                display: flex;
                justify-content: space-around;
                padding: 0;
            }

            #sidebar ul li {
                flex: 1;
                text-align: center;
